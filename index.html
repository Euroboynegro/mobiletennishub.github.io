<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Tennis Hub</title>
<style>
body {margin:0;font-family:Arial, sans-serif;background:#f5f5f5;color:#222;}
header {
  background:url('img1.jpg') center/cover no-repeat;
  height:320px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
  position:relative;
}
header::after {
  content:"";
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);
}
header h1 {
  position:relative;
  font-size:42px;
  z-index:1;
}
section {padding:40px 20px;max-width:1000px;margin:auto;}
.services {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}
.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
}
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}
.gallery img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}
footer {
  background:#111;
  color:white;
  padding:20px;
  text-align:center;
}
footer .footer-gallery {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}
footer .footer-gallery img {
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:6px;
}
.button {
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:#28a745;
  color:white;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>
<body>

<header>
  <h1>Mobile Tennis Hub</h1>
</header>

<section>
  <h2>Professional Racket Stringing</h2>
  <p>Fast, reliable and professional mobile tennis stringing service in Dublin.</p>
  <a class="button" href="tel:0838759390">Call Now</a>
</section>

<section>
  <h2>Services</h2>
  <div class="services">
    <div class="card">Racket Stringing</div>
    <div class="card">Grip Replacement</div>
    <div class="card">Pickup & Delivery</div>
  </div>
</section>

<section>
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
    <img src="img4.jpg">
  </div>
</section>

<section>
  <h2>Contact</h2>
  <p>Call, Text or WhatsApp: <strong>083 875 9390</strong></p>
</section>

<footer>
  <p>© Mobile Tennis Hub</p>
  <div class="footer-gallery">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
  </div>
</footer>

</body>
</html>
